name: Build and Export Docker Image for jupyter sub-project.

on:
  push:
    branches: [ main ]
    paths:
      - 'jupyter/**'
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f jupyter/docker/Dockerfile -t fandommm_voila:latest .

      - name: Save Docker image as tar
        run: |
          mkdir -p artifacts
          docker save fandommm_voila:latest -o artifacts/fandommm_voila.tar

      - name: Upload tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-fandommm_voila-tar
          path: artifacts/fandommm_voila.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag fandommm_voila:latest daltontf1212/fandommm_voila:latest
          docker push daltontf1212/fandommm_voila:latest    